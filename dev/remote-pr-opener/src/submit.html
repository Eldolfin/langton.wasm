<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      font-family: sans-serif;
      margin: 40px;
    }

    form {
      display: flex;
      flex-direction: column;
      max-width: 400px;
    }

    label {
      margin-top: 10px;
    }

    input,
    textarea,
    button {
      margin-top: 5px;
      padding: 8px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
      min-width: 400px;
      resize: both;
    }

    button {
      margin-top: 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <form action="http://localhost:3000/submit" method="POST" enctype="multipart/form-data">
    <label for="name">Name (optional; used for git author)</label>
    <input type="text" id="name" name="name" placeholder="Your name">

    <label for="email">Email (optional; used for git author)</label>
    <input type="email" id="email" name="email" placeholder="you@example.com">

    <label for="patch">Patch</label>
    <textarea id="patch" name="patch" placeholder="diff --git a/Cargo.lock b/Cargo.lock
index b22ff83..e62a254 100644
--- a/Cargo.lock
+++ b/Cargo.lock
@@ -11,18 +11,96 @@ dependencies = [
...
"></textarea>

    <button type="submit">Submit PR!</button>

    *Please note that your IP address (<<USER_IP>>) will be logged for abuse abuse prevention
  </form>
</body>

</html>
