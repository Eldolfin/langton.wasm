name: Build CI Docker image

on:
  push:
    branches: [main]
    paths: [.github/Dockerfile.ci]
  workflow_dispatch:

jobs:
  build:
    runs-on: codeberg-medium
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Codeberg registry
        run: echo "${{ github.token }}" | docker login codeberg.org -u ${{ github.actor }} --password-stdin

      - name: Build and push with kaniko
        run: |
          ARCH=$(uname -m | sed 's/x86_64/amd64/' | sed 's/aarch64/arm64/')
          curl -sL "https://github.com/GoogleContainerTools/kaniko/releases/download/v1.23.2/executor-linux-${ARCH}" \
            -o /usr/local/bin/kaniko
          chmod +x /usr/local/bin/kaniko
          kaniko \
            --dockerfile=.github/Dockerfile.ci \
            --destination=codeberg.org/eldolfin/langton-ci:latest \
            --context=dir://$(pwd) \
            --cache=false \
            --compressed-caching=false
