name: Build CI Docker image

# NOTE: Building container images requires user namespace support which is
# not available in Codeberg's CI runners (unprivileged containers). This
# workflow is provided for use with a self-hosted runner that has Docker
# socket access, or for manual local builds.
#
# To build and push manually:
#   docker buildx build --platform linux/arm64 \
#     -t codeberg.org/eldolfin/langton-ci:latest \
#     -f .github/Dockerfile.ci --push .

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: codeberg-medium
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Codeberg registry
        run: echo "${{ github.token }}" | docker login codeberg.org -u ${{ github.actor }} --password-stdin

      - name: Build and push
        run: |
          docker build \
            -t codeberg.org/eldolfin/langton-ci:latest \
            -f .github/Dockerfile.ci \
            .
          docker push codeberg.org/eldolfin/langton-ci:latest
