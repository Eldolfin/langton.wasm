name: Performance Benchmark

on:
  pull_request:

concurrency:
  group: "benchmark-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    runs-on: codeberg-medium
    steps:
      - name: Checkout PR (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.local/share/mise/shims" >> $GITHUB_PATH

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/mise/installs
            ~/.rustup
            ~/.cargo/registry
            ~/.cargo/git
            target/
            ~/.cache/ms-playwright
            ~/.cache/uv
          key: ${{ runner.os }}-bench-${{ hashFiles('mise.toml', '**/Cargo.lock', 'tests/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-bench-

      - name: Install tools
        env:
          MISE_PYTHON_GITHUB_ATTESTATIONS: "false"
        run: mise install

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Sync e2e dependencies
        run: uv sync --project tests/

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Playwright system deps + browser
        run: uv run --project tests/ playwright install chromium --with-deps

      - name: Save PR benchmark scripts
        run: |
          cp tests/benchmark_interleaved.py /tmp/benchmark_interleaved.py
          cp tests/benchmark_comment.py /tmp/benchmark_comment.py

      # --- Build both versions first ---

      - name: Checkout main branch
        run: git checkout origin/${{ github.event.pull_request.base.ref }}

      - name: Build WASM (main)
        run: cd crates/langton && wasm-pack build --target web --no-typescript

      - name: Save main pkg
        run: cp -r crates/langton/pkg /tmp/main-pkg

      - name: Checkout PR branch
        run: git checkout ${{ github.event.pull_request.head.sha }}

      - name: Build WASM (PR)
        run: cd crates/langton && wasm-pack build --target web --no-typescript

      - name: Save PR pkg
        run: cp -r crates/langton/pkg /tmp/pr-pkg

      # --- Run interleaved benchmark ---

      - name: Run interleaved benchmark
        run: |
          uv run --project tests/ python /tmp/benchmark_interleaved.py \
            --main-pkg /tmp/main-pkg \
            --pr-pkg /tmp/pr-pkg \
            --duration 10 \
            --iterations 5 \
            --main-output main-results.json \
            --pr-output pr-results.json

      - name: Post benchmark comparison comment
        if: github.event_name == 'pull_request'
        env:
          FORGEJO_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python /tmp/benchmark_comment.py main-results.json pr-results.json
