name: Performance Benchmark

on:
  pull_request:

concurrency:
  group: "benchmark-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  IMAGE: codeberg.org/eldolfin/langton.wasm/build-image

jobs:
  build-image:
    runs-on: codeberg-medium
    outputs:
      image: ${{ steps.resolve.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Compute image hash
        id: hash
        run: |
          HASH=$(cat .github/workflows/Dockerfile mise.toml tests/pyproject.toml tests/uv.lock | sha256sum | cut -c1-16)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Image content hash: $HASH"
      - name: Check if image exists
        id: check
        run: |
          if docker manifest inspect "$IMAGE:${{ steps.hash.outputs.hash }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image already exists, skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image not found, will build"
          fi
      - name: Login to registry
        if: steps.check.outputs.exists == 'false'
        run: echo "${{ github.token }}" | docker login codeberg.org -u "${{ github.actor }}" --password-stdin
      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        run: |
          docker build \
            -t "$IMAGE:${{ steps.hash.outputs.hash }}" \
            -t "$IMAGE:latest" \
            -f .github/workflows/Dockerfile .
          docker push "$IMAGE:${{ steps.hash.outputs.hash }}"
          docker push "$IMAGE:latest"
      - name: Set image output
        id: resolve
        run: echo "image=$IMAGE:${{ steps.hash.outputs.hash }}" >> "$GITHUB_OUTPUT"

  benchmark:
    needs: [build-image]
    runs-on: codeberg-medium
    container: ${{ needs.build-image.outputs.image }}
    steps:
      - name: Checkout PR (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Sync e2e dependencies
        run: uv sync --project tests/

      - name: Save PR benchmark scripts
        run: |
          cp tests/benchmark_interleaved.py /tmp/benchmark_interleaved.py
          cp tests/benchmark_comment.py /tmp/benchmark_comment.py

      # --- Build both versions first ---

      - name: Checkout main branch
        run: git checkout origin/${{ github.event.pull_request.base.ref }}

      - name: Build WASM (main)
        run: cd crates/langton && wasm-pack build --target web --no-typescript

      - name: Save main pkg
        run: cp -r crates/langton/pkg /tmp/main-pkg

      - name: Checkout PR branch
        run: git checkout ${{ github.event.pull_request.head.sha }}

      - name: Build WASM (PR)
        run: cd crates/langton && wasm-pack build --target web --no-typescript

      - name: Save PR pkg
        run: cp -r crates/langton/pkg /tmp/pr-pkg

      # --- Run interleaved benchmark ---

      - name: Run interleaved benchmark
        run: |
          uv run --project tests/ python /tmp/benchmark_interleaved.py \
            --main-pkg /tmp/main-pkg \
            --pr-pkg /tmp/pr-pkg \
            --duration 10 \
            --iterations 5 \
            --main-output main-results.json \
            --pr-output pr-results.json

      - name: Post benchmark comparison comment
        if: github.event_name == 'pull_request'
        env:
          FORGEJO_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python /tmp/benchmark_comment.py main-results.json pr-results.json
