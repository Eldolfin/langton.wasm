name: Performance Benchmark

on:
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "justfile"
      - "tests/benchmark_scenarios.py"
      - ".github/workflows/benchmark.yml"

concurrency:
  group: "benchmark-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    runs-on: docker
    container: codeberg.org/eldolfin/langton.wasm/build-image:9a5281b8bd906147
    steps:
      - name: Checkout PR (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-benchmark-${{ hashFiles('**/Cargo.lock') }}

      - name: Sync e2e dependencies
        run: uv sync --project tests/

      - name: Run benchmark
        run: just benchmark ${{ github.event.pull_request.base.ref }} 10 5

      - name: Post benchmark comparison comment
        if: github.event_name == 'pull_request'
        env:
          FORGEJO_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: uv run --project tests/ python tests/benchmark_comment.py main-results.json pr-results.json
