name: Run tests & clippy

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: codeberg-medium
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.local/share/mise/shims" >> $GITHUB_PATH
      - name: Cache mise tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/mise/installs
            ~/.rustup
          key: ${{ runner.os }}-mise-rust-${{ hashFiles('mise.toml') }}
      - name: Install tools
        run: mise install rust
      - name: fmt
        run: cargo fmt --check

  check:
    runs-on: codeberg-medium
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.local/share/mise/shims" >> $GITHUB_PATH
      - name: Cache mise tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/mise/installs
            ~/.rustup
          key: ${{ runner.os }}-mise-rust-${{ hashFiles('mise.toml') }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-check-
      - name: Install tools
        run: mise install rust
      - name: Run tests
        run: cargo test --verbose

  clippy:
    runs-on: codeberg-medium
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.local/share/mise/shims" >> $GITHUB_PATH
      - name: Cache mise tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/mise/installs
            ~/.rustup
          key: ${{ runner.os }}-mise-rust-${{ hashFiles('mise.toml') }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-
      - name: Install tools
        run: mise install rust
      - name: Run clippy
        run: cargo clippy --verbose -- -Dwarnings

  e2e:
    runs-on: codeberg-medium
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.local/share/mise/shims" >> $GITHUB_PATH

      - name: Cache mise tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/mise/installs
            ~/.rustup
          key: ${{ runner.os }}-mise-all-${{ hashFiles('mise.toml') }}

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('tests/requirements.txt') }}

      - name: Cache cargo (wasm build)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Install tools
        env:
          MISE_PYTHON_GITHUB_ATTESTATIONS: "false"
        run: mise install

      - name: Install e2e dependencies
        run: mise run install-e2e-deps

      - name: Install Playwright system deps
        run: tests/.venv/bin/playwright install chromium --with-deps

      - name: Build WASM
        run: cd crates/langton && wasm-pack build --target web --no-typescript

      - name: Run e2e tests
        run: tests/.venv/bin/pytest tests/ -n auto --junit-xml=test-results/junit.xml -v

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: test-results/junit.xml

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: tests/screenshots/
