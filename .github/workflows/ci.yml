name: Run tests & clippy

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: codeberg-medium
    container:
      image: codeberg.org/eldolfin/langton-ci:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-fmt-${{ hashFiles('**/Cargo.lock') }}
      - name: fmt
        run: cargo fmt --check

  check:
    runs-on: codeberg-medium
    container:
      image: codeberg.org/eldolfin/langton-ci:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-check-
      - name: Run tests
        run: cargo test --verbose

  clippy:
    runs-on: codeberg-medium
    container:
      image: codeberg.org/eldolfin/langton-ci:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-clippy-
      - name: Run clippy
        run: cargo clippy --verbose -- -Dwarnings

  e2e:
    runs-on: codeberg-medium
    container:
      image: codeberg.org/eldolfin/langton-ci:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
            ~/.cache/ms-playwright
            ~/.cache/uv
          key: ${{ runner.os }}-e2e-${{ hashFiles('**/Cargo.lock', 'tests/requirements.txt') }}
          restore-keys: ${{ runner.os }}-e2e-

      - name: Install Python deps
        run: |
          uv venv --python 3.12 --clear tests/.venv
          uv pip install --python tests/.venv -r tests/requirements.txt

      - name: Install Playwright browser
        run: tests/.venv/bin/playwright install chromium

      - name: Build WASM
        run: cd crates/langton && wasm-pack build --target web --no-typescript

      - name: Run e2e tests
        run: tests/.venv/bin/pytest tests/ -n auto --junit-xml=test-results/junit.xml -v

      - name: Comment PR with results and screenshots
        if: github.event_name == 'pull_request'
        env:
          FORGEJO_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python tests/ci_comment.py
