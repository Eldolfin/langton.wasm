name: Run tests & clippy

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run tests
        run: |
          cargo test --verbose
      - name: Run clippy
        run: |
          cargo clippy --verbose -- -Dwarnings

  e2e:
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: cd crates/langton && wasm-pack build --target web --no-typescript

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python venv
        run: uv venv tests/.venv

      - name: Install Python dependencies
        run: uv pip install --python tests/.venv playwright pytest pytest-playwright

      - name: Install Playwright browsers
        run: tests/.venv/bin/playwright install chromium --with-deps

      - name: Run e2e tests
        run: tests/.venv/bin/pytest tests/ -v
