name: Run tests & clippy

on:
  push:
    branches: ["main"]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "justfile"
      - "tests/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "justfile"
      - "tests/**"
      - ".github/workflows/ci.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: codeberg-medium
    container: codeberg.org/eldolfin/langton.wasm/build-image:9a5281b8bd906147
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-ci-${{ hashFiles('**/Cargo.lock') }}
      - name: checks
        run: just ci

  e2e:
    runs-on: codeberg-medium
    container: codeberg.org/eldolfin/langton.wasm/build-image:9a5281b8bd906147
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
      - name: Run e2e tests
        run: just test-e2e --junit-xml=test-results/junit.xml -v
      - name: Comment PR with results and screenshots
        if: github.event_name == 'pull_request' && always()
        env:
          FORGEJO_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python tests/ci_comment.py
