name: Run tests & clippy

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  IMAGE: codeberg.org/eldolfin/langton.wasm/build-image

jobs:
  build-image:
    runs-on: codeberg-medium
    outputs:
      image: ${{ steps.resolve.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Compute image hash
        id: hash
        run: |
          HASH=$(cat .github/workflows/Dockerfile mise.toml tests/pyproject.toml tests/uv.lock | sha256sum | cut -c1-16)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Image content hash: $HASH"
      - name: Check if image exists
        id: check
        run: |
          if docker manifest inspect "$IMAGE:${{ steps.hash.outputs.hash }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image already exists, skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image not found, will build"
          fi
      - name: Login to registry
        if: steps.check.outputs.exists == 'false'
        run: echo "${{ github.token }}" | docker login codeberg.org -u "${{ github.actor }}" --password-stdin
      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        run: |
          docker build \
            -t "$IMAGE:${{ steps.hash.outputs.hash }}" \
            -t "$IMAGE:latest" \
            -f .github/workflows/Dockerfile .
          docker push "$IMAGE:${{ steps.hash.outputs.hash }}"
          docker push "$IMAGE:latest"
      - name: Set image output
        id: resolve
        run: echo "image=$IMAGE:${{ steps.hash.outputs.hash }}" >> "$GITHUB_OUTPUT"

  fmt:
    needs: [build-image]
    runs-on: codeberg-medium
    container: ${{ needs.build-image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: fmt
        run: cargo fmt --check

  check:
    needs: [build-image]
    runs-on: codeberg-medium
    container: ${{ needs.build-image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Run tests
        run: cargo test --verbose

  clippy:
    needs: [build-image]
    runs-on: codeberg-medium
    container: ${{ needs.build-image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Run clippy
        run: cargo clippy --verbose -- -Dwarnings

  e2e:
    needs: [build-image]
    runs-on: codeberg-medium
    container: ${{ needs.build-image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Sync e2e dependencies
        run: uv sync --project tests/

      - name: Build WASM
        run: cd crates/langton && wasm-pack build --target web --no-typescript

      - name: Run e2e tests
        run: uv run --project tests/ pytest tests/ -n auto --junit-xml=test-results/junit.xml -v

      - name: Comment PR with results and screenshots
        if: github.event_name == 'pull_request'
        env:
          FORGEJO_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python tests/ci_comment.py
