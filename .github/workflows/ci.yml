name: Run tests & clippy

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run tests
        run: |
          cargo fmt --check

  check:
    runs-on: codeberg-medium
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run tests
        run: |
          cargo test --verbose

  clippy:
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run clippy
        run: |
          cargo clippy --verbose -- -Dwarnings

  e2e:
    runs-on: codeberg-medium
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        run: curl https://mise.run | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python and e2e dependencies
        run: |
          mise install
          mise run install-e2e-deps

      - name: Install Playwright system deps
        run: tests/.venv/bin/playwright install chromium --with-deps

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: cd crates/langton && wasm-pack build --target web --no-typescript

      - name: Run e2e tests
        run: tests/.venv/bin/pytest tests/ -n auto --junit-xml=test-results/junit.xml -v
