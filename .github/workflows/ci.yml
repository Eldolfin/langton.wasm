name: Run tests & clippy

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: codeberg-medium
    container: codeberg.org/eldolfin/langton.wasm/build-image:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: fmt
        run: cargo fmt --check

  check:
    runs-on: codeberg-medium
    container: codeberg.org/eldolfin/langton.wasm/build-image:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Run tests
        run: cargo test --verbose

  clippy:
    runs-on: codeberg-medium
    container: codeberg.org/eldolfin/langton.wasm/build-image:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Run clippy
        run: cargo clippy --verbose -- -Dwarnings

  e2e:
    runs-on: codeberg-medium
    container: codeberg.org/eldolfin/langton.wasm/build-image:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Sync e2e dependencies
        run: uv sync --project tests/

      - name: Build WASM
        run: cd crates/langton && wasm-pack build --target web --no-typescript

      - name: Run e2e tests
        run: uv run --project tests/ pytest tests/ -n auto --junit-xml=test-results/junit.xml -v

      - name: Comment PR with results and screenshots
        if: github.event_name == 'pull_request'
        env:
          FORGEJO_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python tests/ci_comment.py
