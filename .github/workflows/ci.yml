name: Run tests & clippy

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run tests
        run: |
          cargo fmt --check

  check:
    runs-on: codeberg-medium
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run tests
        run: |
          cargo test --verbose

  clippy:
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run clippy
        run: |
          cargo clippy --verbose -- -Dwarnings

  e2e:
    runs-on: codeberg-medium
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Install e2e dependencies
        run: mise run install-e2e-deps

      - name: Install Playwright system deps
        run: tests/.venv/bin/playwright install chromium --with-deps

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: cd crates/langton && wasm-pack build --target web --no-typescript

      - name: Run e2e tests
        run: tests/.venv/bin/pytest tests/ -n auto --junit-xml=test-results/junit.xml -v

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: test-results/junit.xml

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: tests/screenshots/
          if-no-files-found: ignore
