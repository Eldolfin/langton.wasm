name: Deploy to pages

on:
  push:
    branches: ["main"]

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  deploy:
    runs-on: codeberg-medium
    container: codeberg.org/eldolfin/langton.wasm/build-image:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: |
          cd crates/langton
          wasm-pack build --target web

      - name: Prepare deploy directory
        run: |
          DEPLOY_DIR="deploy"
          mkdir -p "$DEPLOY_DIR/pkg"
          cp index.html              "$DEPLOY_DIR/"
          cp favicon.png             "$DEPLOY_DIR/"
          cp crates/langton/pkg/langton.js      "$DEPLOY_DIR/pkg/"
          cp crates/langton/pkg/langton_bg.wasm "$DEPLOY_DIR/pkg/"
          cp crates/langton/pkg/package.json    "$DEPLOY_DIR/pkg/"
          cp crates/langton/pkg/LICENSE         "$DEPLOY_DIR/pkg/" 2>/dev/null || true
          cp crates/langton/pkg/README.md       "$DEPLOY_DIR/pkg/" 2>/dev/null || true

      - name: Push to pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan pages-tmp
          git rm -rf .
          cp -r deploy/* .
          echo -e "/target\n.direnv\n.pre-commit-config.yaml\n.env\ndeploy\nsrc" > .gitignore
          git add .
          git commit -m "$(date --iso-8601=seconds)"
          git push --force origin pages-tmp:pages
