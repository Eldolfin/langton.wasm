name: Deploy to pages

on:
  push:
    branches: ["main"]

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  IMAGE: codeberg.org/eldolfin/langton.wasm/build-image

jobs:
  build-image:
    runs-on: codeberg-medium
    outputs:
      image: ${{ steps.resolve.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Compute image hash
        id: hash
        run: |
          HASH=$(cat .github/workflows/Dockerfile mise.toml tests/pyproject.toml tests/uv.lock | sha256sum | cut -c1-16)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Image content hash: $HASH"
      - name: Check if image exists
        id: check
        run: |
          if docker manifest inspect "$IMAGE:${{ steps.hash.outputs.hash }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image already exists, skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image not found, will build"
          fi
      - name: Login to registry
        if: steps.check.outputs.exists == 'false'
        run: echo "${{ github.token }}" | docker login codeberg.org -u "${{ github.actor }}" --password-stdin
      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        run: |
          docker build \
            -t "$IMAGE:${{ steps.hash.outputs.hash }}" \
            -t "$IMAGE:latest" \
            -f .github/workflows/Dockerfile .
          docker push "$IMAGE:${{ steps.hash.outputs.hash }}"
          docker push "$IMAGE:latest"
      - name: Set image output
        id: resolve
        run: echo "image=$IMAGE:${{ steps.hash.outputs.hash }}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: [build-image]
    runs-on: codeberg-medium
    container: ${{ needs.build-image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: |
          cd crates/langton
          wasm-pack build --target web

      - name: Prepare deploy directory
        run: |
          DEPLOY_DIR="deploy"
          mkdir -p "$DEPLOY_DIR/pkg"
          cp index.html              "$DEPLOY_DIR/"
          cp favicon.png             "$DEPLOY_DIR/"
          cp crates/langton/pkg/langton.js      "$DEPLOY_DIR/pkg/"
          cp crates/langton/pkg/langton_bg.wasm "$DEPLOY_DIR/pkg/"
          cp crates/langton/pkg/package.json    "$DEPLOY_DIR/pkg/"
          cp crates/langton/pkg/LICENSE         "$DEPLOY_DIR/pkg/" 2>/dev/null || true
          cp crates/langton/pkg/README.md       "$DEPLOY_DIR/pkg/" 2>/dev/null || true

      - name: Push to pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan pages-tmp
          git rm -rf .
          cp -r deploy/* .
          echo -e "/target\n.direnv\n.pre-commit-config.yaml\n.env\ndeploy\nsrc" > .gitignore
          git add .
          git commit -m "$(date --iso-8601=seconds)"
          git push --force origin pages-tmp:pages
