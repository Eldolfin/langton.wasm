name: Deploy to pages

on:
  push:
    branches: ["main"]

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  deploy:
    runs-on: codeberg-medium
    container: codeberg.org/eldolfin/langton.wasm/build-image:88b2a30450288968
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: just build-web

      - name: Prepare deploy directory
        run: |
          DEPLOY_DIR="deploy"
          mkdir -p "$DEPLOY_DIR"
          cp crates/app/index.html   "$DEPLOY_DIR/"
          cp crates/app/favicon.png  "$DEPLOY_DIR/"
          cp -r crates/app/pkg/      "$DEPLOY_DIR/pkg/"

      - name: Push to pages branch
        run: |
          rm deploy/pkg/.gitignore
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan pages-tmp
          git rm -rf .
          cp -r deploy/* .
          echo -e "/target\n.direnv\n.pre-commit-config.yaml\n.env\ndeploy\nsrc" > .gitignore
          git add .
          git commit -m "$(date --iso-8601=seconds)"
          git push --force origin pages-tmp:pages
