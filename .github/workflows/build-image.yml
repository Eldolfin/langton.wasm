name: Build CI image

on:
  workflow_call:
    outputs:
      image:
        description: "Full image reference (with content-hash tag)"
        value: ${{ jobs.build-image.outputs.image }}

env:
  IMAGE: codeberg.org/eldolfin/langton.wasm/build-image

jobs:
  build-image:
    runs-on: codeberg-medium
    outputs:
      image: ${{ steps.resolve.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image hash
        id: hash
        run: |
          HASH=$(cat .github/workflows/Dockerfile mise.toml tests/pyproject.toml tests/uv.lock | sha256sum | cut -c1-16)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Image content hash: $HASH"

      - name: Check if image exists
        id: check
        run: |
          TAG="${{ steps.hash.outputs.hash }}"
          TOKEN=$(curl -s -u "${{ secrets.REGISTRY_TOKEN }}" \
            "https://codeberg.org/v2/token" | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://codeberg.org/v2/eldolfin/langton.wasm%2Fbuild-image/manifests/$TAG" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.v2+json, application/vnd.docker.distribution.manifest.list.v2+json")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image $IMAGE:$TAG already exists (HTTP $STATUS)"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image $IMAGE:$TAG not found (HTTP $STATUS), will build"
          fi

      - name: Install podman
        if: steps.check.outputs.exists == 'false'
        run: |
          apt-get update -qq
          apt-get install -y -qq podman fuse-overlayfs uidmap > /dev/null
          echo "root:100000:65536" >> /etc/subuid
          echo "root:100000:65536" >> /etc/subgid
          mkdir -p /etc/containers /var/lib/containers/storage /run/containers/storage
          cat > /etc/containers/storage.conf <<'EOF'
[storage]
driver = "vfs"
runroot = "/run/containers/storage"
graphroot = "/var/lib/containers/storage"
EOF

      - name: Login to registry
        if: steps.check.outputs.exists == 'false'
        run: |
          USER=$(echo "${{ secrets.REGISTRY_TOKEN }}" | cut -d: -f1)
          PASS=$(echo "${{ secrets.REGISTRY_TOKEN }}" | cut -d: -f2-)
          echo "$PASS" | podman login codeberg.org -u "$USER" --password-stdin

      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.hash.outputs.hash }}"
          podman build \
            -t "$IMAGE:$TAG" \
            -t "$IMAGE:latest" \
            -f .github/workflows/Dockerfile .
          podman push "$IMAGE:$TAG"
          podman push "$IMAGE:latest"

      - name: Set image output
        id: resolve
        run: echo "image=$IMAGE:${{ steps.hash.outputs.hash }}" >> "$GITHUB_OUTPUT"
