name: Build CI image

on:
  workflow_call:
    outputs:
      image:
        description: "Full image reference (with content-hash tag)"
        value: ${{ jobs.build-image.outputs.image }}

env:
  IMAGE: codeberg.org/eldolfin/langton.wasm/build-image

jobs:
  build-image:
    runs-on: codeberg-medium
    outputs:
      image: ${{ steps.resolve.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image hash
        id: hash
        run: |
          HASH=$(cat .github/workflows/Dockerfile mise.toml tests/pyproject.toml tests/uv.lock | sha256sum | cut -c1-16)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Image content hash: $HASH"

      - name: Detect container tool
        id: tool
        run: |
          echo "=== Diagnostics ==="
          for t in buildah podman docker skopeo crane; do
            printf "%-10s %s\n" "$t:" "$(command -v $t 2>/dev/null || echo 'not found')"
          done
          echo "Docker socket: $(ls -la /var/run/docker.sock 2>&1)"
          echo "OS: $(cat /etc/os-release 2>/dev/null | head -3)"
          echo "==================="
          if command -v buildah &> /dev/null; then
            echo "cmd=buildah" >> "$GITHUB_OUTPUT"
          elif command -v podman &> /dev/null; then
            echo "cmd=podman" >> "$GITHUB_OUTPUT"
          elif [ -S /var/run/docker.sock ] && command -v docker &> /dev/null; then
            echo "cmd=docker" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if image exists
        id: check
        run: |
          TAG="${{ steps.hash.outputs.hash }}"
          # Use REGISTRY_TOKEN (username:token) for registry auth
          TOKEN=$(curl -s -u "${{ secrets.REGISTRY_TOKEN }}" \
            "https://codeberg.org/v2/token" | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://codeberg.org/v2/eldolfin/langton.wasm%2Fbuild-image/manifests/$TAG" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.v2+json, application/vnd.docker.distribution.manifest.list.v2+json")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image $IMAGE:$TAG already exists (HTTP $STATUS)"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image $IMAGE:$TAG not found (HTTP $STATUS), will build"
          fi

      - name: Fail if build needed but no container tool
        if: steps.check.outputs.exists == 'false' && steps.tool.outputs.cmd == ''
        run: |
          echo "::error::Image $IMAGE:${{ steps.hash.outputs.hash }} not in registry and no container build tool (docker/podman) available."
          echo "Build and push locally: just build-push-build-image"
          exit 1

      - name: Login to registry
        if: steps.check.outputs.exists == 'false'
        run: |
          CMD="${{ steps.tool.outputs.cmd }}"
          USER=$(echo "${{ secrets.REGISTRY_TOKEN }}" | cut -d: -f1)
          PASS=$(echo "${{ secrets.REGISTRY_TOKEN }}" | cut -d: -f2-)
          echo "$PASS" | $CMD login codeberg.org -u "$USER" --password-stdin

      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        run: |
          CMD="${{ steps.tool.outputs.cmd }}"
          TAG="${{ steps.hash.outputs.hash }}"
          $CMD build \
            -t "$IMAGE:$TAG" \
            -t "$IMAGE:latest" \
            -f .github/workflows/Dockerfile .
          $CMD push "$IMAGE:$TAG"
          $CMD push "$IMAGE:latest"

      - name: Set image output
        id: resolve
        run: echo "image=$IMAGE:${{ steps.hash.outputs.hash }}" >> "$GITHUB_OUTPUT"
