[tools]
python = "3.14.5"
rust = {version = "1.96.0", targets = "wasm32-unknown-unknown"}
# "cargo:live-server" = "latest"
node = "latest"
uv = "latest"
just = "latest"
"npm:wasm-pack" = "latest"
rust-analyzer = "latest"

[tasks.install-e2e-deps]
description = "Install e2e test dependencies and Playwright browser"
run = [
  "uv sync --project tests",
  "uv run --project tests playwright install chromium",
]

[tasks.test-e2e]
description = "Run end-to-end Playwright tests"
run = "uv run --project tests pytest tests/ -n auto -v"
