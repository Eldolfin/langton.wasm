<!doctype html>
<html lang="en">

<head>
  <meta content="text/html;charset=utf-8" http-equiv="Content-Type" />
  <link rel="icon" type="image/x-icon" href="/favicon.png" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    #picker {
      background-color: #1e1e1e;
      width: 100%;
      height: 100%;
      display: grid;
      transition: opacity 0.3s ease;
    }

    .picker-card {
      position: relative;
      cursor: pointer;
      overflow: hidden;
      transition: opacity 0.2s;
    }

    .picker-card:hover {
      opacity: 0.95;
    }

    .picker-card canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    .picker-card .label {
      position: absolute;
      bottom: 16px;
      left: 16px;
      color: #fff;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      font-size: 18px;
      font-weight: 500;
      white-space: nowrap;
      padding: 8px 14px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .picker-card:hover .label {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div id="picker" style="display: none;"></div>
  <script type="module" defer>
    import init, { get_animations, start_animation, start_preview } from "./pkg/coolbg.js";
    (async () => {
      await init();

      const params = new URLSearchParams(window.location.search);
      const animId = params.get("animation");

      if (animId) {
        start_animation(animId);
      } else {
        showPicker();
      }

      window.addEventListener("popstate", () => {
        window.location.reload();
      });
    })();

  let animationRunning = false;

  function showPicker() {
      const picker = document.getElementById("picker");
      picker.style.display = "";

      const animations = JSON.parse(get_animations());
      const cols = Math.min(3, animations.length);
      picker.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

      for (const anim of animations) {
        const card = document.createElement("div");
        card.className = "picker-card";
        card.dataset.animId = anim.id;

        const canvas = document.createElement("canvas");
        canvas.width = 240;
        canvas.height = 180;
        card.appendChild(canvas);

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = anim.name;
        card.appendChild(label);

        card.addEventListener("click", () => {
          picker.style.opacity = "0";
          setTimeout(() => {
            picker.style.display = "none";
            picker.innerHTML = "";
            const url = new URL(window.location);
            url.searchParams.set("animation", anim.id);
            window.history.pushState(null, "", url);
            animationRunning = true;
            start_animation(anim.id);
          }, 300);
        });

        picker.appendChild(card);
        start_preview(anim.id, canvas);
      }
    }

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && animationRunning) {
        window.location.search = "";
      }
    });
  </script>
</body>

</html>
